# use 256 colors
set -g default-terminal "screen-256color"

# plugins

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'thewtex/tmux-mem-cpu-load'

# vim binds
set-window-option -g mode-keys vi

# status
set -g status-position top
set -g status-right '#[fg=colour233,bg=colour241,bold] #(tmux-mem-cpu-load -a 0 -t 0 -m 2 -g 0 --interval 2) \
#[default]#[fg=colour233,bg=colour245,bold] %d/%m #[fg=colour233,bg=colour245,bold] %H:%M:%S '
set -g status-right-length 50

# set -g status-right "#[fg=colour233,bg=colour241,bold]#($TMUX_PLUGIN_MANAGER_PATH/tmux-mem-cpu-load/tmux-mem-cpu-load --interval 2)#[default]"

setw -g window-status-format ' #[fg=colour250,bold]#I#[fg=colour250,bold]:#[fg=colour250]#W#[fg=colour50] '
setw -g window-status-current-format ' #[fg=colour250,bold]#I#[fg=colour250,bold]:#[fg=colour250]#W#[fg=colour50]#F '

# reload config file
bind r source-file ~/.tmux.conf

# mouse
set -g mouse-select-window on
set -g mouse-select-pane on
set -g mouse-resize-pane on

# borders
set -g pane-border-fg black
set -g pane-active-border-fg brightred

# status line
set -g status-bg default
set -g status-fg colour12
set -g status-interval 2

# init tpm
run '~/.tmux/plugins/tpm/tpm'
